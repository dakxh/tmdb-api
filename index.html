<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metadata Generator</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --surface-color: #1a1a1a;
            --border-color: #333;
            --text-main: #f1f1f1;
            --text-muted: #888;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --anime-accent: #f472b6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            line-height: 1.5;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1, h2, h3 { font-weight: 600; margin-top: 0; }
        .card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .input-group { display: flex; gap: 10px; margin-bottom: 1rem; align-items: center; }
        input, select {
            flex: 1; padding: 10px 12px;
            background-color: var(--bg-color); border: 1px solid var(--border-color);
            color: var(--text-main); border-radius: 6px; font-size: 1rem;
        }
        select.pipeline-select { flex: 0 0 250px; border-color: var(--accent); }
        input:focus, select:focus { outline: none; border-color: var(--accent); }
        button.primary-btn {
            padding: 10px 20px; background-color: var(--accent); color: white;
            border: none; border-radius: 6px; font-size: 1rem;
            cursor: pointer; transition: background-color 0.2s;
        }
        button.primary-btn:hover { background-color: var(--accent-hover); }
        .results-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px; margin-top: 15px;
        }
        .result-item {
            background-color: var(--surface-color); border: 1px solid var(--border-color);
            border-radius: 6px; padding: 10px; cursor: pointer; transition: border-color 0.2s;
        }
        .result-item:hover { border-color: var(--accent); }
        .result-title { font-weight: 600; margin-bottom: 5px; }
        .result-meta { font-size: 0.85rem; color: var(--text-muted); }
        
        /* Custom JSON Renderer Styles */
        .json-block {
            background-color: #000; border: 1px solid var(--border-color);
            padding: 15px; border-radius: 6px; overflow-x: auto;
            font-family: monospace; font-size: 0.95rem; color: #e5e5e5;
            margin-bottom: 15px; line-height: 1.6;
        }
        .json-header {
            font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px;
            text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
            display: flex; justify-content: space-between;
        }
        .json-header.catalog { color: #facc15; }
        .json-header.metadata { color: #38bdf8; }
        .json-header.anime { color: var(--anime-accent); }
        
        .json-key { color: #9cdcfe; }
        .json-string { color: #ce9178; }
        .json-number { color: #b5cea8; }
        .json-boolean { color: #569cd6; }
        
        .copy-inline-btn {
            background: none; border: none; cursor: pointer; padding: 0;
            margin-left: 12px; font-size: 1.1rem; opacity: 0.6; transition: opacity 0.2s;
            vertical-align: middle;
        }
        .copy-inline-btn:hover { opacity: 1; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>TMDB Setup & Search</h2>
        <div class="input-group">
            <input type="password" id="apiKey" placeholder="Paste TMDB API Key here (It will save automatically!)" autocomplete="off">
        </div>
        <div class="input-group">
            <select id="pipelineMode" class="pipeline-select" onchange="handlePipelineChange()">
                <option value="main3">🎬 Standard Pipeline (main3.yml)</option>
                <option value="main4">🌸 Anime Pipeline (main4.yml)</option>
            </select>
            <input type="text" id="searchQuery" placeholder="Search for a movie or TV series..." onkeypress="if(event.key === 'Enter') searchTMDB()">
            <button class="primary-btn" onclick="searchTMDB()">Search</button>
        </div>
    </div>

    <div id="resultsContainer" class="card hidden">
        <h3>Search Results</h3>
        <div id="resultsGrid" class="results-grid"></div>
    </div>

    <div id="tvControls" class="card hidden">
        <h3>Season Selection</h3>
        <p class="result-meta" id="tvTitleDisplay"></p>
        <div class="input-group" style="margin-top: 10px;">
            <select id="seasonPicker" onchange="generateOutputs()"></select>
        </div>
    </div>

    <div id="outputContainer" class="hidden"></div>
</div>

<script>
    const API_BASE = 'https://api.themoviedb.org/3';
    const IMG_POSTER = 'https://image.tmdb.org/t/p/w600_and_h900_bestv2';
    const IMG_BACKDROP = 'https://image.tmdb.org/t/p/w1280_and_h720_multi_faces';
    
    let activeItem = null;

    document.addEventListener("DOMContentLoaded", () => {
        const savedKey = localStorage.getItem('tmdb_api_key_saved');
        if (savedKey) document.getElementById('apiKey').value = savedKey;
        
        const savedPipeline = localStorage.getItem('pipeline_mode_saved');
        if (savedPipeline) document.getElementById('pipelineMode').value = savedPipeline;
    });

    function handlePipelineChange() {
        const mode = document.getElementById('pipelineMode').value;
        localStorage.setItem('pipeline_mode_saved', mode);
        if (activeItem && activeItem.media_type === 'movie') {
            generateOutputs(); // Refresh if movie is already selected
        } else if (activeItem && activeItem.media_type === 'tv' && document.getElementById('seasonPicker').value) {
            generateOutputs(); // Refresh if season is selected
        }
    }

    async function searchTMDB() {
        const key = document.getElementById('apiKey').value.trim();
        const query = document.getElementById('searchQuery').value.trim();
        if (!key || !query) return alert("Please enter both an API Key and a Search Query.");

        localStorage.setItem('tmdb_api_key_saved', key);

        const res = await fetch(`${API_BASE}/search/multi?api_key=${key}&query=${encodeURIComponent(query)}`);
        const data = await res.json();
        
        const grid = document.getElementById('resultsGrid');
        grid.innerHTML = '';
        
        const items = data.results.filter(i => i.media_type === 'movie' || i.media_type === 'tv');
        
        if (items.length === 0) grid.innerHTML = '<p class="result-meta">No movies or series found.</p>';

        items.forEach(item => {
            const el = document.createElement('div');
            el.className = 'result-item';
            const title = item.media_type === 'movie' ? item.title : item.name;
            const date = item.media_type === 'movie' ? item.release_date : item.first_air_date;
            const year = date ? date.substring(0, 4) : 'Unknown Year';
            
            el.innerHTML = `
                <div class="result-title">${title}</div>
                <div class="result-meta">${item.media_type.toUpperCase()} • ${year}</div>
            `;
            el.onclick = () => selectItem(item);
            grid.appendChild(el);
        });

        document.getElementById('resultsContainer').classList.remove('hidden');
        document.getElementById('tvControls').classList.add('hidden');
        document.getElementById('outputContainer').classList.add('hidden');
    }

    async function selectItem(item) {
        const key = document.getElementById('apiKey').value.trim();
        activeItem = item;
        
        document.getElementById('outputContainer').innerHTML = '';
        document.getElementById('outputContainer').classList.remove('hidden');

        if (item.media_type === 'movie') {
            document.getElementById('tvControls').classList.add('hidden');
            generateOutputs(); 
        } 
        else if (item.media_type === 'tv') {
            const res = await fetch(`${API_BASE}/tv/${item.id}?api_key=${key}`);
            const tvData = await res.json();
            
            activeItem.detailedData = tvData; 
            
            document.getElementById('tvTitleDisplay').innerText = `Selected: ${tvData.name}`;
            const picker = document.getElementById('seasonPicker');
            picker.innerHTML = '<option value="" disabled selected>Select a season...</option>';
            
            tvData.seasons.forEach(s => {
                if (s.season_number > 0) {
                    const opt = document.createElement('option');
                    opt.value = s.season_number;
                    opt.innerText = `Season ${s.season_number} (${s.episode_count} Episodes)`;
                    picker.appendChild(opt);
                }
            });

            document.getElementById('tvControls').classList.remove('hidden');
        }
    }

    async function generateOutputs() {
        const mode = document.getElementById('pipelineMode').value;
        const outContainer = document.getElementById('outputContainer');
        outContainer.innerHTML = ''; 
        
        const mockTime = Math.floor(Date.now() / 1000);
        const resolution = "1080p";
        const variation = "1080p.SDR";

        if (activeItem.media_type === 'movie') {
            const title = activeItem.title || "Unknown Title";
            const year = activeItem.release_date ? activeItem.release_date.substring(0, 4) : "";
            const rating = activeItem.vote_average ? parseFloat(activeItem.vote_average.toFixed(1)) : 0.0;
            const poster = activeItem.poster_path ? `${IMG_POSTER}${activeItem.poster_path}` : "";
            const backdrop = activeItem.backdrop_path ? `${IMG_BACKDROP}${activeItem.backdrop_path}` : "";
            const overview = activeItem.overview || "";
            const safeDir = encodeURIComponent(`${title}.${year}.${variation}`);

            if (mode === 'main3') {
                const movieMeta = {
                    id: activeItem.id,
                    type: "movie",
                    original_filename: "Mock.Movie.1080p.mkv",
                    title: title,
                    year: year,
                    rating: rating,
                    quality: resolution,
                    duration: "2h 5m",
                    IMAX: false,
                    HDR: false,
                    poster_url: poster,
                    backdrop_url: backdrop,
                    hls_manifest_url: `https://huggingface.co/buckets/{HF_BUCKET}/${safeDir}/master.m3u8`,
                    overview: overview,
                    available_audio: ["eng"],
                    available_subs: ["eng"],
                    date_added: mockTime
                };
                
                const catalogMeta = {
                    id: activeItem.id,
                    type: "movie",
                    title: title,
                    year: year,
                    date_added: mockTime,
                    available_resolutions: [resolution],
                    available_variations: [variation],
                    hls_manifest_url: { [variation]: `https://huggingface.co/buckets/{HF_BUCKET}/${safeDir}/master.m3u8` },
                    poster_url: poster
                };

                renderInteractiveJSON("metadata", "Movie Profile (metadata.json)", movieMeta);
                renderInteractiveJSON("catalog", "Global Catalog Entry (global_catalog.json)", catalogMeta);
            } 
            else if (mode === 'main4') {
                const movieMeta = {
                    id: activeItem.id,
                    type: "movie",
                    title: title,
                    movie_title: title,
                    original_filename: "[MockSubs] Anime Movie (1080p).mkv",
                    year: year,
                    rating: rating,
                    source: "WEB-DL",
                    quality: resolution,
                    duration: "1h 55m",
                    size: "2.1 GB",
                    HDR: false,
                    available_audio: ["jpn", "eng"],
                    ass_subtitles: [{ url: `https://huggingface.co/buckets/{HF_ANIME_BUCKET}/${safeDir}/subs_0_English.ass`, label: "English" }],
                    fonts: [`https://huggingface.co/buckets/{HF_ANIME_BUCKET}/${safeDir}/fonts/default.woff2`],
                    poster_url: poster,
                    backdrop_url: backdrop,
                    overview: overview,
                    date_added: mockTime,
                    hls_manifest_url: `https://huggingface.co/buckets/{HF_ANIME_BUCKET}/${safeDir}/master.m3u8`
                };

                const catalogMeta = {
                    id: activeItem.id,
                    type: "movie",
                    title: title,
                    year: year,
                    available_resolutions: [resolution],
                    available_variations: [variation],
                    date_added: mockTime,
                    metadata_url: { [variation]: `https://huggingface.co/buckets/{HF_ANIME_BUCKET}/${safeDir}/metadata.json` },
                    poster_url: poster
                };

                renderInteractiveJSON("anime", "Anime Movie Profile (metadata.json)", movieMeta);
                renderInteractiveJSON("catalog", "Global Catalog Entry (global_catalog.json)", catalogMeta);
            }
        } 
        else if (activeItem.media_type === 'tv') {
            const seasonNum = document.getElementById('seasonPicker').value;
            if (!seasonNum) return;

            const tv = activeItem.detailedData;
            const title = tv.name || "Unknown Series";
            const year = tv.first_air_date ? tv.first_air_date.substring(0, 4) : "";
            const rating = tv.vote_average ? parseFloat(tv.vote_average.toFixed(1)) : 0.0;
            const baseDirSafe = encodeURIComponent(title);
            const epsDirSafe = encodeURIComponent(`${title}/Season.${seasonNum.padStart(2, '0')}/Episode.01`);
            const mockManifest = `https://huggingface.co/buckets/{BUCKET_VAR}/${epsDirSafe}/master.m3u8`;

            // Fetch season data to mock episodes correctly
            const key = document.getElementById('apiKey').value.trim();
            const res = await fetch(`${API_BASE}/tv/${tv.id}/season/${seasonNum}?api_key=${key}`);
            const seasonData = await res.json();
            
            let poster = seasonData.poster_path ? `${IMG_POSTER}${seasonData.poster_path}` : (tv.poster_path ? `${IMG_POSTER}${tv.poster_path}` : "");
            let overview = seasonData.overview || tv.overview || "";

            let episodesList = [];
            if (seasonData.episodes && seasonData.episodes.length > 0) {
                seasonData.episodes.forEach(ep => {
                    const epUrl = `https://huggingface.co/buckets/{BUCKET_VAR}/${encodeURIComponent(`${title}/Season.${seasonNum.padStart(2, '0')}/Episode.${String(ep.episode_number).padStart(2, '0')}`)}/master.m3u8`;
                    episodesList.push({
                        season_number: parseInt(seasonNum),
                        episode_number: ep.episode_number,
                        episode_name: ep.name || `Episode ${ep.episode_number}`,
                        quality: resolution,
                        date_added: mockTime,
                        hls_manifest_url: epUrl
                    });
                });
            } else {
                episodesList.push({ season_number: parseInt(seasonNum), episode_number: 1, episode_name: "Episode 1", quality: resolution, date_added: mockTime, hls_manifest_url: mockManifest });
            }

            if (mode === 'main3') {
                const masterMeta = {
                    id: tv.id,
                    type: "series",
                    title: title,
                    year: year,
                    rating: rating,
                    quality: resolution,
                    duration: "45m",
                    IMAX: false,
                    HDR: false,
                    poster_url: poster,
                    backdrop_url: tv.backdrop_path ? `${IMG_BACKDROP}${tv.backdrop_path}` : "",
                    overview: overview,
                    date_added: mockTime,
                    _total_secs: 2700,
                    _ep_count: 1,
                    episodes: episodesList
                };
                
                const epOne = seasonData.episodes ? seasonData.episodes[0] : null;
                const epName = epOne ? epOne.name : "Episode 1";

                const episodeMeta = {
                    id: tv.id,
                    series_title: title,
                    season_number: parseInt(seasonNum),
                    episode_number: 1,
                    episode_name: epName,
                    original_filename: `Mock.Series.S${seasonNum.padStart(2, '0')}E01.1080p.mkv`,
                    quality: resolution,
                    duration: "45m",
                    size: "1.2 GB",
                    available_audio: ["eng"],
                    available_subs: ["eng"],
                    date_added: mockTime,
                    hls_manifest_url: mockManifest.replace("{BUCKET_VAR}", "{HF_BUCKET}")
                };

                const catalogMeta = {
                    id: tv.id,
                    type: "series",
                    title: title,
                    year: year,
                    quality: resolution,
                    date_added: mockTime,
                    series_metadata_url: `https://huggingface.co/buckets/{HF_BUCKET}/${baseDirSafe}/metadata.json`,
                    poster_url: poster
                };

                renderInteractiveJSON("metadata", "Series Master Profile (Base metadata.json)", masterMeta);
                renderInteractiveJSON("metadata", "Example Episode Profile (Episode 1 metadata.json)", episodeMeta);
                renderInteractiveJSON("catalog", "Global Catalog Entry (global_catalog.json)", catalogMeta);
            } 
            else if (mode === 'main4') {
                const masterMeta = {
                    id: tv.id,
                    type: "anime",
                    title: title,
                    year: year,
                    rating: rating,
                    source: "WEB-DL",
                    quality: resolution,
                    average_duration: "24m",
                    HDR: false,
                    poster_url: poster,
                    backdrop_url: tv.backdrop_path ? `${IMG_BACKDROP}${tv.backdrop_path}` : "",
                    overview: overview,
                    date_added: mockTime,
                    _total_secs: 1440,
                    _ep_count: 1,
                    episodes: episodesList.map(ep => ({...ep, hls_manifest_url: ep.hls_manifest_url.replace("{BUCKET_VAR}", "{HF_ANIME_BUCKET}")}))
                };

                const epOne = seasonData.episodes ? seasonData.episodes[0] : null;
                const epName = epOne ? epOne.name : "Episode 1";

                const episodeMeta = {
                    id: tv.id,
                    series_title: title,
                    season_number: parseInt(seasonNum),
                    episode_number: 1,
                    episode_name: epName,
                    original_filename: `[MockSubs] Anime Series - 01 (1080p).mkv`,
                    quality: resolution,
                    duration: "24m",
                    size: "800 MB",
                    available_audio: ["jpn", "eng"],
                    ass_subtitles: [{ url: mockManifest.replace("{BUCKET_VAR}", "{HF_ANIME_BUCKET}").replace("master.m3u8", "subs_0_English.ass"), label: "English" }],
                    fonts: [mockManifest.replace("{BUCKET_VAR}", "{HF_ANIME_BUCKET}").replace("master.m3u8", "fonts/default.woff2")],
                    date_added: mockTime,
                    hls_manifest_url: mockManifest.replace("{BUCKET_VAR}", "{HF_ANIME_BUCKET}")
                };

                const catalogMeta = {
                    id: tv.id,
                    type: "anime",
                    title: title,
                    year: year,
                    date_added: mockTime,
                    available_seasons: [seasonNum],
                    season_sources: { [seasonNum]: "WEB-DL" },
                    season_metadata_urls: { [seasonNum]: `https://huggingface.co/buckets/{HF_ANIME_BUCKET}/${baseDirSafe}/metadata.json` },
                    poster_url: poster
                };

                renderInteractiveJSON("anime", "Anime Master Profile (Base metadata.json)", masterMeta);
                renderInteractiveJSON("anime", "Example Episode Profile (Episode 1 metadata.json)", episodeMeta);
                renderInteractiveJSON("catalog", "Global Catalog Entry (global_catalog.json)", catalogMeta);
            }
        }
    }

    function renderInteractiveJSON(typeClass, label, data) {
        const outContainer = document.getElementById('outputContainer');
        
        const wrapper = document.createElement('div');
        wrapper.className = 'json-wrapper';
        
        const header = document.createElement('div');
        header.className = `json-header ${typeClass}`;
        header.innerHTML = `<span>${label}</span> <span>📋 Formatted</span>`;
        
        const block = document.createElement('pre');
        block.className = 'json-block';
        
        const jsonString = JSON.stringify(data, null, 4);
        
        // Basic Syntax Highlighting matching the Python JSON dump
        let highlighted = jsonString
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                        // Add copy button logic directly on hover or inline for keys if desired, keeping it clean for now
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
            
        block.innerHTML = highlighted;
        
        wrapper.appendChild(header);
        wrapper.appendChild(block);
        outContainer.appendChild(wrapper);
    }
</script>
</body>
</html>
